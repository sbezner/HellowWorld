// ── Sunrise/Sunset calculator (NOAA algorithm) ─────────────────────────────
function calcSun(lat, lng, date) {
  const rad = Math.PI / 180;
  const jd = Math.floor(365.25 * (date.getFullYear() + 4716)) + Math.floor(30.6001 * ((date.getMonth() < 2 ? date.getMonth() + 13 : date.getMonth() + 1))) + date.getDate() - 1524.5;
  const jc = (jd - 2451545) / 36525;
  const gml = (280.46646 + jc * (36000.76983 + 0.0003032 * jc)) % 360;
  const gma = 357.52911 + jc * (35999.05029 - 0.0001537 * jc);
  const eeo = 0.016708634 - jc * (0.000042037 + 0.0000001267 * jc);
  const sec = Math.sin(gma * rad) * (1.914602 - jc * (0.004817 + 0.000014 * jc)) + Math.sin(2 * gma * rad) * (0.019993 - 0.000101 * jc) + Math.sin(3 * gma * rad) * 0.000289;
  const stl = gml + sec, sta = gma + sec;
  const sal = stl - 0.00569 - 0.00478 * Math.sin((125.04 - 1934.136 * jc) * rad);
  const oe = 23 + (26 + ((21.448 - jc * (46.815 + jc * (0.00059 - jc * 0.001813)))) / 60) / 60 + 0.00256 * Math.cos((125.04 - 1934.136 * jc) * rad);
  const sd = Math.asin(Math.sin(oe * rad) * Math.sin(sal * rad)) / rad;
  const y = Math.tan(oe / 2 * rad) * Math.tan(oe / 2 * rad);
  const eot = 4 * (y * Math.sin(2 * gml * rad) - 2 * eeo * Math.sin(gma * rad) + 4 * eeo * y * Math.sin(gma * rad) * Math.cos(2 * gml * rad) - 0.5 * y * y * Math.sin(4 * gml * rad) - 1.25 * eeo * eeo * Math.sin(2 * gma * rad)) / rad;
  const ha = Math.acos(Math.cos(90.833 * rad) / (Math.cos(lat * rad) * Math.cos(sd * rad)) - Math.tan(lat * rad) * Math.tan(sd * rad)) / rad;
  function etOffset(d) { var mar=new Date(d.getFullYear(),2,1),nov=new Date(d.getFullYear(),10,1); mar.setDate(14-mar.getDay()); nov.setDate(1+(7-nov.getDay())%7); return(d>=mar&&d<nov)?240:300; }
  const noon = (720 - 4 * lng - eot - etOffset(date)) / 1440;
  const rise = noon - ha * 4 / 1440, set = noon + ha * 4 / 1440;
  function fmt(f) { var m = Math.round(f * 1440); if (m < 0) m += 1440; m = m % 1440; const h = Math.floor(m / 60), mn = m % 60, ap = h >= 12 ? 'PM' : 'AM'; return ((h % 12) || 12) + ':' + (mn < 10 ? '0' : '') + mn + ' ' + ap; }
  const daylight = (set - rise) * 24;
  const nowUtc = date.getUTCHours() * 60 + date.getUTCMinutes();
  const now = ((nowUtc - etOffset(date) + 1440) % 1440) / 1440;
  const remaining = (now >= rise && now <= set) ? Math.max(0, (set - now) * 24) : 0;
  return { rise: fmt(rise), set: fmt(set), daylight: daylight.toFixed(1), remaining: parseFloat(remaining.toFixed(1)), setFrac: set };
}

function getWaterStatus(waterText) {
  const w = waterText.toLowerCase();
  if (w.includes('no water')) return 'red';
  if (w.includes('year-round') || w.includes('reliable') || w.includes('running water') || w.includes('piped') || w.includes('in front of'))
    return 'green';
  return 'yellow';
}

// Populate dropdowns
const fromSel = document.getElementById('from-shelter');
const toSel = document.getElementById('to-shelter');
let lastState = '';
shelters.forEach((s, i) => {
  if (s.state !== lastState) {
    lastState = s.state;
    const grpFrom = document.createElement('optgroup');
    const grpTo = document.createElement('optgroup');
    const label = s.state === 'GSMNP' ? 'Great Smoky Mountains' : s.state === 'NC' ? 'North Carolina' : 'Georgia';
    grpFrom.label = label;
    grpTo.label = label;
    fromSel.appendChild(grpFrom);
    toSel.appendChild(grpTo);
  }
  const optFrom = document.createElement('option');
  optFrom.value = i;
  optFrom.textContent = `${s.name} (Mile ${s.mile})`;
  fromSel.lastElementChild.appendChild(optFrom);
  const optTo = document.createElement('option');
  optTo.value = i;
  optTo.textContent = `${s.name} (Mile ${s.mile})`;
  toSel.lastElementChild.appendChild(optTo);
});

fromSel.addEventListener('change', calculate);
toSel.addEventListener('change', calculate);

function swapShelters() {
  const tmp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = tmp;
  calculate();
}

function calculate() {
  const fi = parseInt(fromSel.value);
  const ti = parseInt(toSel.value);
  const results = document.getElementById('results');
  if (isNaN(fi) || isNaN(ti) || fi === ti) {
    results.classList.remove('show');
    return;
  }

  const from = shelters[fi];
  const to = shelters[ti];
  const isNobo = fi < ti;
  const startIdx = Math.min(fi, ti);
  const endIdx = Math.max(fi, ti);

  // Distance
  const distance = Math.abs(to.mile - from.mile).toFixed(1);

  // Elevation gain/loss along the route
  let gain = 0, loss = 0;
  const routeShelters = shelters.slice(startIdx, endIdx + 1);
  if (!isNobo) routeShelters.reverse();
  for (let i = 1; i < routeShelters.length; i++) {
    const diff = routeShelters[i].elev - routeShelters[i - 1].elev;
    if (diff > 0) gain += diff;
    else loss += Math.abs(diff);
  }

  // Update stats
  document.getElementById('stat-distance').textContent = distance;
  document.getElementById('stat-gain').textContent = '+' + gain.toLocaleString() + ' ft';
  document.getElementById('stat-loss').textContent = '-' + loss.toLocaleString() + ' ft';
  document.getElementById('results-title').textContent = isNobo
    ? from.name.replace(' Shelter', '') + ' \u2192 ' + to.name.replace(' Shelter', '')
    : from.name.replace(' Shelter', '') + ' \u2192 ' + to.name.replace(' Shelter', '');
  document.getElementById('route-count').textContent = routeShelters.length;

  // Direction badge
  const badge = document.getElementById('direction-badge');
  badge.className = 'direction-badge ' + (isNobo ? 'direction-nobo' : 'direction-sobo');
  badge.textContent = isNobo ? '\u2191 NOBO (Northbound)' : '\u2193 SOBO (Southbound)';

  // Route list
  const list = document.getElementById('route-list');
  list.innerHTML = '';
  routeShelters.forEach((s, i) => {
    const li = document.createElement('li');
    if (i === 0 || i === routeShelters.length - 1) li.className = 'endpoint';
    const stateClass = s.state === 'GSMNP' ? 'gsmnp' : s.state.toLowerCase();
    const ws = getWaterStatus(s.water);
    const segmentMile = i === 0 ? '0.0' : Math.abs(s.mile - routeShelters[i - 1].mile).toFixed(1);
    const segmentLabel = i === 0 ? 'Start' : '+' + segmentMile + ' mi';
    li.innerHTML = `<span class="route-dot ${stateClass}"></span><a href="${s.url}" style="flex:1;min-width:0;color:inherit;text-decoration:none;" class="route-name">${s.name}</a><span class="water-dot ${ws}" title="Water: ${s.water}"></span><span class="route-elev">${s.elev.toLocaleString()} ft</span><span class="route-mile">${segmentLabel}</span>`;
    list.appendChild(li);
  });

  // Daylight / arrive before dark estimate
  const daylightBox = document.getElementById('daylight-box');
  const dest = to;
  const sun = calcSun(dest.lat, dest.lng, new Date());
  const dist = parseFloat(distance);
  const paces = [
    { mph: 1.5, label: 'Slow (1.5 mph)' },
    { mph: 2.0, label: 'Average (2.0 mph)' },
    { mph: 2.5, label: 'Fast (2.5 mph)' },
  ];
  const now = new Date();
  const etOff = (function(d) { var mar=new Date(d.getFullYear(),2,1),nov=new Date(d.getFullYear(),10,1); mar.setDate(14-mar.getDay()); nov.setDate(1+(7-nov.getDay())%7); return(d>=mar&&d<nov)?240:300; })(now);
  const nowHours = ((now.getUTCHours() * 60 + now.getUTCMinutes() - etOff + 1440) % 1440) / 60;

  let html = `<div class="title">&#127765; Arrive Before Dark?</div>`;
  html += `<div style="margin-bottom:0.5rem;font-size:0.82rem;color:#718096;">Sunset at ${dest.name.replace(' Shelter','')}: <strong>${sun.set}</strong> &bull; ${sun.daylight}h total daylight</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:0.5rem;">`;

  let bestStatus = 'safe';
  paces.forEach(p => {
    const hours = dist / p.mph;
    const arriveHour = nowHours + hours;
    const arriveMin = Math.round((arriveHour % 1) * 60);
    const arriveH = Math.floor(arriveHour) % 24;
    const ap = arriveH >= 12 ? 'PM' : 'AM';
    const arriveStr = ((arriveH % 12) || 12) + ':' + (arriveMin < 10 ? '0' : '') + arriveMin + ' ' + ap;
    const sunsetHour = sun.setFrac * 24;
    const margin = sunsetHour - arriveHour;
    let status, statusText, color;
    if (margin > 2) { status = 'safe'; statusText = 'Plenty of light'; color = '#276749'; }
    else if (margin > 0.5) { status = 'warning'; statusText = 'Cutting it close'; color = '#744210'; }
    else if (margin > 0) { status = 'danger'; statusText = 'Near dark'; color = '#742a2a'; }
    else { status = 'danger'; statusText = 'After dark'; color = '#742a2a'; }
    if (status === 'danger') bestStatus = 'danger';
    else if (status === 'warning' && bestStatus !== 'danger') bestStatus = 'warning';
    html += `<div style="flex:1;min-width:100px;background:white;border-radius:6px;padding:0.5rem;text-align:center;font-size:0.82rem;">`;
    html += `<div style="font-weight:bold;color:#4a5568;margin-bottom:0.2rem;">${p.label}</div>`;
    html += `<div style="color:#2d3748;">${hours.toFixed(1)}h hiking</div>`;
    html += `<div style="color:#2d3748;">Arrive ~${arriveStr}</div>`;
    html += `<div style="font-weight:bold;color:${color};margin-top:0.2rem;">${statusText}</div>`;
    html += `</div>`;
  });
  html += `</div>`;
  daylightBox.innerHTML = html;
  daylightBox.className = 'daylight-box ' + bestStatus;
  daylightBox.style.display = 'block';

  results.classList.add('show');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
