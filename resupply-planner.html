  function getWaterStatus(w) {

    return 'green';
  }

    var s = getWaterStatus(w);
    if (s === 'red') return 'water-red';
    if (s === 'yellow') return 'water-yellow';

  function getMiles() { return parseInt(document.getElementById('sl-miles').value, 10); }
  function getDays()  { return parseInt(document.getElementById('sl-days').value, 10); }
  var direction = 'nobo';

  function nearestTown(mile) {
    var best = null, bestDist = Infinity;
    for (var i = 0; i < TOWNS.length; i++) {
      var d = Math.abs(TOWNS[i].mile - mile);
      if (d < bestDist) { bestDist = d; best = TOWNS[i]; }
    }
    return { town: best, dist: bestDist };
  }

  function planDays(shelters, dailyMax) {
    var stops = {};
    var currentMile = direction === 'nobo' ? 0 : 469.0;
    var ordered = shelters.slice();
    if (direction === 'sobo') ordered.reverse();
    var dayNum = 0, remaining = ordered.slice();
    while (remaining.length > 0) {
      var bestIdx = -1;
      for (var j = 0; j < remaining.length; j++) {
        if (Math.abs(remaining[j].mile - currentMile) <= dailyMax) bestIdx = j;
        else break;
      }
      if (bestIdx === -1) bestIdx = 0;
      dayNum++;
      var stop = remaining[bestIdx];
      var dayMiles = Math.abs(stop.mile - currentMile);
      stops[stop.mile] = { dayNum: dayNum, dayMiles: dayMiles, forced: dayMiles > dailyMax };
      currentMile = stop.mile;
      remaining = remaining.slice(bestIdx + 1);
    }
    return stops;
  }

  function townWaypointHtml(t, maxRange) {
    var html = '<div class="town-wp">'
      + '<div class="town-wp-bar" onclick="this.parentElement.classList.toggle(\'open\')">'
      + '<div class="town-wp-left">'
      + '<div class="town-wp-name">' + t.name + '<span class="badge ' + t.badge + '">' + t.badgeText + '</span></div>'
      + '<div class="town-wp-meta">Mile ' + t.mile
      + (t.offTrail > 0 ? ' &bull; ' + t.offTrail + ' mi off-trail' : ' &bull; On-trail') + '</div>'
      + '<div class="town-wp-svcs">'
      + t.services.slice(0, 5).map(function (s) { return '<span class="town-wp-svc">' + s + '</span>'; }).join('')
      + '</div></div>'
      + '<span class="town-wp-arrow">&#9660;</span>'
      + '</div>'
      + '<div class="town-wp-body">'
      + '<div class="svc-full">'
      + t.services.map(function (s) { return '<span class="svc">' + s + '</span>'; }).join('')
      + (t.mailDrop ? '<span class="svc svc-mail">Mail Drop OK</span>' : '')
      + '</div>'
      + '<div class="town-desc">' + t.desc + '</div>'
      + (t.mailDrop && t.mailAddr ? '<div class="mail-addr">' + t.mailAddr + '</div>' : '')
      + ((t.phone || t.web) ? '<div class="contact-row">'
      + (t.phone ? '<a class="call-btn" href="tel:' + t.phone.replace(/\D/g, '') + '">' + t.phone + '</a>' : '')
      + (t.web ? '<a class="web-btn" href="' + t.web + '" target="_blank">' + t.webLabel + '</a>' : '')
      + '</div>' : '')
      + '</div></div>';
    return html;
  }

  function stopCardHtml(s, dayInfo) {
    var isSmokies = s.mile >= 168.1 && s.mile <= 227.3;
    var wDot = waterDotClass(s.water);
    var nt = nearestTown(s.mile);

    var html = '<div class="stop-card' + (isSmokies ? ' is-smokies' : '') + '">';
    html += '<div class="stop-head">'
      + '<span class="stop-day' + (isSmokies ? ' stop-day-smokies' : '') + '">Day ' + dayInfo.dayNum + '</span>'
      + '<span class="stop-mi">' + dayInfo.dayMiles.toFixed(1) + ' mi'
      + (dayInfo.forced ? ' <span class="forced">long day</span>' : '') + '</span>'
      + '</div>';
    html += '<div class="stop-name-row">'
      + '<span class="water-dot ' + wDot + '" title="' + s.water.replace(/"/g, '&quot;') + '"></span>'
      + '<a class="stop-name" href="' + s.url + '">' + s.name + '</a>';
    if (s.closed) {
      var reason = s.closed === 'bears' ? 'Closed (bears)' : s.closed === 'structural' ? 'Closed (structural)' : s.closed === 'fire' ? 'Closed (fire)' : 'Closed';
      html += '<span class="closed-tag">' + reason + '</span>';
    }
    html += '</div>';
    html += '<div class="stop-stats">Mile ' + s.mile + ' &bull; '
      + s.elev.toLocaleString() + ' ft &bull; Cap ' + s.cap + ' &bull; '
      + (s.type === 'stone-cabin' ? 'Stone cabin' : 'Lean-to') + '</div>';
    html += '<div class="stop-water">' + s.water + '</div>';

    if (nt.town && nt.dist <= 30) {
      var t = nt.town;
      var dir = t.mile <= s.mile ? 'S' : 'N';
      html += '<div class="stop-town">'
        + '<div class="stop-town-head">' + t.name.replace(/&mdash;.*/, '').trim()
        + ' &mdash; ' + nt.dist.toFixed(1) + ' mi ' + dir
        + (t.offTrail > 0 ? ' + ' + t.offTrail + ' mi road' : '') + '</div>'
        + '<div class="stop-town-svcs">'
        + t.services.slice(0, 5).map(function (sv) { return '<span class="stop-town-svc">' + sv + '</span>'; }).join('')
        + '</div>';
      if (t.phone) {
        html += '<div class="stop-town-phone"><a href="tel:' + t.phone.replace(/\D/g, '') + '">' + t.phone + '</a></div>';
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function passLineHtml(s) {
    var wDot = waterDotClass(s.water);
    return '<div class="pass-line">'
      + '<span class="water-dot ' + wDot + '"></span>'
      + '<a href="' + s.url + '">' + s.name.replace(' Shelter', '') + '</a>'
      + (s.closed ? ' <span class="closed-tag">' + (s.closed === 'permanent' ? 'Closed' : 'Closed (' + s.closed + ')') + '</span>' : '')
      + '<span class="pass-mi">mi ' + s.mile + ' &bull; ' + s.elev.toLocaleString() + '\'</span>'
      + '</div>';
  }

  function render() {
    var dailyMiles = getMiles();
    var carryDays = getDays();
    var maxRange = dailyMiles * carryDays;

    document.getElementById('val-miles').textContent = dailyMiles;
    document.getElementById('val-days').textContent = carryDays;

    var stops = planDays(SHELTERS, dailyMiles);
    var ordered = SHELTERS.slice();
    if (direction === 'sobo') ordered.reverse();

    var townsByMile = {};
    TOWNS.forEach(function (t) { townsByMile[t.mile] = t; });
    var townMiles = TOWNS.map(function (t) { return t.mile; });
    if (direction === 'sobo') townMiles.reverse();

    var html = '';
    var totalDays = 0;
    var insertedTowns = {};
    var smokiesBandInserted = false;

    for (var i = 0; i < ordered.length; i++) {
      var s = ordered[i];

      for (var ti = 0; ti < townMiles.length; ti++) {
        var tm = townMiles[ti];
        if (insertedTowns[tm]) continue;
        var shouldInsert = direction === 'nobo' ? (tm <= s.mile) : (tm >= s.mile);
        if (shouldInsert) {
          html += townWaypointHtml(townsByMile[tm], maxRange);
          insertedTowns[tm] = true;
          var townIdx = TOWNS.indexOf(townsByMile[tm]);
          var nextDist = 0, nextName = '';
          if (direction === 'nobo' && townIdx < TOWNS.length - 1) {
            nextDist = TOWNS[townIdx + 1].mile - townsByMile[tm].mile;
            nextName = TOWNS[townIdx + 1].name.replace(/&mdash;.*/, '').trim();
          } else if (direction === 'sobo' && townIdx > 0) {
            nextDist = townsByMile[tm].mile - TOWNS[townIdx - 1].mile;
            nextName = TOWNS[townIdx - 1].name.replace(/&mdash;.*/, '').trim();
          }
          if (nextDist > maxRange) {
            html += '<div class="carry-warn">Next resupply: ' + nextName
              + ' (' + nextDist.toFixed(1) + ' mi) exceeds your '
              + maxRange + '-mi carry range by ' + (nextDist - maxRange).toFixed(1) + ' mi</div>';
          }
        }
      }

      if (s.mile >= 168.1 && s.mile <= 227.3 && !smokiesBandInserted) {
        var msg = direction === 'nobo'
          ? 'Entering Great Smoky Mountains NP &mdash; no resupply for 62 mi (Fontana Dam &rarr; Standing Bear). Permit required.'
          : 'Entering Great Smoky Mountains NP &mdash; no resupply for 62 mi (Standing Bear &rarr; Fontana Dam). Permit required.';
        html += '<div class="smokies-enter">' + msg + '</div>';
        smokiesBandInserted = true;
      }

      var dayInfo = stops[s.mile] || null;
      if (dayInfo) {
        totalDays = Math.max(totalDays, dayInfo.dayNum);
        html += stopCardHtml(s, dayInfo);
      } else {
        html += passLineHtml(s);
      }
    }

    for (var ti2 = 0; ti2 < townMiles.length; ti2++) {
      if (!insertedTowns[townMiles[ti2]]) {
        html += townWaypointHtml(townsByMile[townMiles[ti2]], maxRange);
      }
    }

    html += '<div class="summary-bar"><strong>' + totalDays + ' hiking days</strong> at ' + dailyMiles + ' mi/day &bull; 469 miles</div>';

    document.getElementById('trail-guide').innerHTML = html;
    document.getElementById('ctrl-total').innerHTML = '<strong>' + totalDays + '</strong> hiking days';
  }

  document.getElementById('btn-nobo').addEventListener('click', function () {
    direction = 'nobo';
    this.classList.add('active');
    document.getElementById('btn-sobo').classList.remove('active');
    render();
  });
  document.getElementById('btn-sobo').addEventListener('click', function () {
    direction = 'sobo';
    this.classList.add('active');
    document.getElementById('btn-nobo').classList.remove('active');
    render();
  });

  document.getElementById('sl-miles').addEventListener('input', render);
  document.getElementById('sl-days').addEventListener('input', render);

  render();

}());
